# Example Secret for the portal. Do NOT commit a real one with filled values.
# Create the real Secret out-of-band, e.g.:
#
#   kubectl create secret generic shoveler-auth-portal \
#     --from-literal=CILOGON_CLIENT_ID=... \
#     --from-literal=CILOGON_CLIENT_SECRET=... \
#     --from-literal=SESSION_SECRET="$(python -c 'import secrets;print(secrets.token_urlsafe(48))')" \
#     --from-literal=PORTAL_BASE_URL=https://shoveler-auth.osg.example \
#     --from-literal=TOKEN_ISSUER=https://shoveler-auth.osg.example/ \
#     --from-literal=RESOURCE_SERVER_ID=my_rabbit_server
#
# Authorization is driven by COmanage group membership (CILogon's isMemberOf
# claim), so there is no allow-list ConfigMap to mount — see COMANAGE_GROUP_PREFIX
# and REGISTRY_ADMIN_GROUP below.
apiVersion: v1
kind: Secret
metadata:
  name: shoveler-auth-portal
type: Opaque
stringData:
  CILOGON_CLIENT_ID: "cilogon:/client_id/REPLACE_ME"
  CILOGON_CLIENT_SECRET: "REPLACE_ME"
  SESSION_SECRET: "REPLACE_ME_LONG_RANDOM"
  PORTAL_BASE_URL: "https://shoveler-auth.osg.example"
  TOKEN_ISSUER: "https://shoveler-auth.osg.example/"
  RESOURCE_SERVER_ID: "my_rabbit_server"
  SCOPE_CLAIM: "extra_scope"
  SCOPE_VALUE: "my_rabbit_server.write:*/xrd-shoveled"
  TOKEN_TTL_SECONDS: "14400"
  IDLE_DAYS: "30"
  ADMIN_CONTACT: "osg-help@opensciencegrid.org"
  # COmanage group prefix: membership in "<prefix><site>" grants management of <site>.
  COMANAGE_GROUP_PREFIX: "shoveler-"
  # COmanage group whose members are registry-wide admins (see /admin, may
  # disable any client). Leave empty to disable the admin view.
  REGISTRY_ADMIN_GROUP: ""
